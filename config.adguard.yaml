# AdGuard DNS Family Protection 設定
# -------------------------------------------------------
# 登録不要・無料・無制限
# マルウェア/フィッシング/アダルトコンテンツをブロック
# Safe Search 強制 (Google/Bing)
# YouTube は Safe Mode になるが完全ブロックはしない
#   → blocklist.txt に youtube.com 等を追加して補完する
# -------------------------------------------------------

listen_ip: "0.0.0.0"
listen_port: 53

# AdGuard DNS Family Protection
# プライマリ: 94.140.14.15, セカンダリ: 94.140.15.16
upstream_dns: "94.140.14.15:53"

blocklist_file: "/usr/local/etc/my-dns/blocklist.txt"
log_file: "/var/log/my-dns/query.log"
log_max_bytes: 10485760
cache_ttl: 300
blocklist_reload_interval: 60
upstream_timeout_sec: 5
management_addr: "127.0.0.1:8080"

# AdGuard Family はブロック時に自社のブロックページIP (94.140.14.35) を返す
block_detect_ips:
  - "0.0.0.0"
  - "94.140.14.35"
